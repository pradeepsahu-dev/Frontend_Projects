<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Githubid-Finder</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="header">
            <img class="githubicon" src="assets/githubicon.png" alt="Github Icon" />
            <input class="input-data" placeholder="Enter user name" >
            <button class="search-btn">search</button>
        </div>
        <div class="body-details">
            <div class="profile-box">
                <img class="profileimage" src=""  alt="user profile"/>
            </div>

            <div class="details">
                <h1 class="username"></h1>
                <div class="userdetails">
                    <p class="bio">
                    </p>

                </div>
                
                <div class="userdata">
                    <h2 class="follow" id="followers"> </h2>
                     <h2 class="follow" id="following"> </h2>
                      <h2 class="repos"> </h2>
                </div>
                
                <div class="repo-container"></div>

            </div>
        
        </div>
    </div>

    <script src="app.js" ></script>
</body>
</html>
